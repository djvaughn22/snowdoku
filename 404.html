<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found | OpenDoku</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#0b1220">
<style>
  :root{
    --bg:#0b1220; --panel:#141d2e; --border:#26324c;
    --ink:#e8edf5; --dim:#94a3b8; --accent:#7dd3fc;
    --btn:#1e2f4d; --btnbd:#3a5a80;
  }
  [data-theme="light"]{
    --bg:#fefcf9; --panel:#ffffff; --border:#e4e4e7;
    --ink:#1c1917; --dim:#57534e; --accent:#0284c7;
    --btn:#f4f4f5; --btnbd:#d4d4d8;
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:Georgia,'Times New Roman',serif; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:20px;}
  p.code{margin:0; font-family:system-ui,sans-serif; font-size:.72rem; font-weight:900; letter-spacing:.2em; color:var(--dim);}
  h1{margin:0; font-size:1.9rem;}
  p.note{margin:0; color:var(--dim);}
  a.home{margin-top:10px; display:inline-flex; align-items:center; font-family:system-ui,sans-serif; font-weight:800; font-size:.95rem; color:var(--ink); text-decoration:none; background:var(--btn); border:1px solid var(--btnbd); border-radius:50px; padding:12px 22px;}
</style>
</head>
<body>
<script>try{if(localStorage.getItem('om-theme')==='light')document.body.dataset.theme='light';}catch(e){}</script>
<p class="code">404</p>
<h1>Page not found</h1>
<p class="note">That page doesn’t exist here.</p>
<a class="home" href="/">Back to OpenDoku</a>
</body>
</html>
